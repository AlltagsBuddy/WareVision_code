services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: warevision
      POSTGRES_PASSWORD: warevision
      POSTGRES_DB: warevision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warevision"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://warevision:warevision@postgres:5432/warevision
      SECRET_KEY: dev-secret-key-change-in-production
      UPLOAD_DIR: /app/uploads
      # Für Tests von anderen Systemen: zusätzliche CORS-Origins (kommagetrennt)
      # CORS_ORIGINS_EXTRA: "http://192.168.1.100:5173,https://test.warevision.de"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Backup: docker compose run backup (manuell)
  # Tägliches Backup: siehe docs/ANLEITUNG_BACKUP.md
  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: warevision
      PGPASSWORD: warevision
      PGDATABASE: warevision
      BACKUP_DIR: /backups
    volumes:
      - backup_data:/backups
      - ./infra/backup/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backup

volumes:
  postgres_data:
  uploads_data:
  backup_data:
